<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Chatbot</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0a0a;color:#e2e8f0;font-family:system-ui,sans-serif;overflow:hidden}
    .layout{height:100vh;display:flex;flex-direction:column;max-width:780px;margin:0 auto;padding:16px;gap:12px}
    .header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .header h1{font-size:18px;font-weight:500;color:#fff}
    .header span{font-size:12px;color:#4a4a4a;background:#141414;padding:4px 10px;border-radius:20px;border:0.5px solid #2a2a2a}
    .upload-card{background:#111111;border:0.5px solid #222;border-radius:12px;padding:14px 16px;flex-shrink:0}
    .upload-row{display:flex;gap:10px;align-items:center}
    .file-btn{background:#1a1a1a;border:0.5px solid #333;color:#e2e8f0;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .file-btn:hover{background:#222}
    .file-name{font-size:13px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-name.loaded{color:#e2e8f0}
    .api-input{flex:1;background:#0a0a0a;border:0.5px solid #222;color:#e2e8f0;padding:7px 12px;border-radius:8px;font-size:13px;outline:none;min-width:0}
    .api-input:focus{border-color:#c0392b}
    .upload-btn{background:#c0392b;color:#fff;border:none;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .upload-btn:hover{background:#e74c3c}
    .upload-btn:disabled{background:#2a2a2a;color:#444;cursor:not-allowed}
    .status-bar{display:none;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;font-size:12px;margin-top:10px}
    .status-bar.loading{display:flex;background:#1a0f0f;color:#e74c3c;border:0.5px solid #3a1a1a}
    .status-bar.success{display:flex;background:#0f1a0f;color:#4ade80;border:0.5px solid #1a3a1a}
    .status-bar.error{display:flex;background:#1a0f0f;color:#f87171;border:0.5px solid #3a1a1a}
    .spinner{width:12px;height:12px;border:2px solid #c0392b;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .chat-area{background:#111111;border:0.5px solid #222;border-radius:12px;display:flex;flex-direction:column;flex:1;min-height:0}
    .messages{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
    .messages::-webkit-scrollbar{width:4px}
    .messages::-webkit-scrollbar-track{background:transparent}
    .messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}
    .msg{display:flex;flex-direction:column;gap:3px}
    .msg.user{align-items:flex-end}
    .msg.bot{align-items:flex-start}
    .bubble{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6;max-width:82%}
    .msg.user .bubble{background:#c0392b;color:#fff;border-bottom-right-radius:3px}
    .msg.bot .bubble{background:#1a1a1a;color:#e2e8f0;border-bottom-left-radius:3px;border:0.5px solid #2a2a2a}
    .msg-time{font-size:10px;color:#333}
    .thinking{display:flex;gap:4px;align-items:center;padding:9px 13px;background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:12px;border-bottom-left-radius:3px;width:fit-content}
    .dot{width:5px;height:5px;border-radius:50%;background:#c0392b;animation:bounce 1.2s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:0.2s}
    .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
    .input-row{display:flex;gap:8px;padding:12px;border-top:0.5px solid #1a1a1a}
    .question-input{flex:1;background:#0a0a0a;border:0.5px solid #222;color:#e2e8f0;padding:9px 12px;border-radius:8px;font-size:13px;outline:none}
    .question-input:focus{border-color:#c0392b}
    .ask-btn{background:#c0392b;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
    .ask-btn:hover{background:#e74c3c}
    .ask-btn:disabled{background:#2a2a2a;color:#444;cursor:not-allowed}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;font-size:13px;gap:8px}
    .empty-icon{width:36px;height:36px;border:1.5px solid #2a2a2a;border-radius:8px;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>

<div class="layout">
  <div class="header">
    <h1>PDF Chatbot</h1>
  </div>

  <div class="upload-card">
    <div class="upload-row">
      <button class="file-btn" onclick="document.getElementById('fileInput').click()">Choose PDF</button>
      <span class="file-name" id="fileName">No file selected</span>
      <input class="api-input" type="password" id="apiKey" placeholder="Gemini API key">
      <button class="upload-btn" id="uploadBtn" onclick="upload()">Upload</button>
    </div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="onFileChange(this)">
    <div class="status-bar" id="statusBar">
      <div class="spinner" id="statusSpinner" style="display:none"></div>
      <span id="statusText"></span>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        </div>
        <span>Upload a PDF to start chatting</span>
      </div>
    </div>
    <div class="input-row">
      <input type="text" class="question-input" id="questionInput" placeholder="Ask a question about the PDF..." onkeydown="if(event.key==='Enter')ask()">
      <button class="ask-btn" id="askBtn" onclick="ask()">Ask</button>
    </div>
  </div>
</div>

<script>
  let pdfReady = false;

  function onFileChange(input){
    const el = document.getElementById('fileName');
    el.textContent = input.files[0]?.name || 'No file selected';
    el.className = 'file-name' + (input.files[0] ? ' loaded' : '');
  }

  function setStatus(type, text, spinner=false){
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar ' + type;
    document.getElementById('statusSpinner').style.display = spinner ? 'block' : 'none';
    document.getElementById('statusText').textContent = text;
  }

  async function upload(){
    const file = document.getElementById('fileInput').files[0];
    const apiKey = document.getElementById('apiKey').value.trim();
    if(!file){ setStatus('error','Select a PDF first'); return; }
    if(!apiKey){ setStatus('error','Enter your Gemini API key'); return; }

    document.getElementById('uploadBtn').disabled = true;
    setStatus('loading','Processing ' + file.name + '...', true);

    const fd = new FormData();
    fd.append('file', file);
    fd.append('api_key', apiKey);

    try{
      const res = await fetch('/upload', {method:'POST', body: fd});
      const data = await res.json();
      if(!res.ok){
        setStatus('error', data.detail || 'Upload failed');
      } else {
        setStatus('success', file.name + ' is ready — ask your questions below');
        pdfReady = true;
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('questionInput').focus();
      }
    } catch(e){
      setStatus('error', e.message);
    }
    document.getElementById('uploadBtn').disabled = false;
  }

  function addMessage(role, text){
    const container = document.getElementById('messages');
    const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="bubble">${text}</div><span class="msg-time">${now}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addThinking(){
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'thinking';
    div.innerHTML = '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function ask(){
    const question = document.getElementById('questionInput').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    if(!question || !apiKey) return;
    if(!pdfReady){ setStatus('error','Upload a PDF first'); return; }

    document.getElementById('questionInput').value = '';
    document.getElementById('askBtn').disabled = true;
    addMessage('user', question);
    addThinking();

    try{
      const res = await fetch('/ask',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({question, api_key: apiKey})
      });
      const data = await res.json();
      document.getElementById('thinking')?.remove();
      addMessage('bot', data.answer || data.detail || 'No response');
    } catch(e){
      document.getElementById('thinking')?.remove();
      addMessage('bot','Error: ' + e.message);
    }
    document.getElementById('askBtn').disabled = false;
  }
</script>

</body>
</html>
